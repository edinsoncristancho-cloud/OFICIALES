<!DOCTYPE html>
<html lang="es">
<head>

<script>
// Eliminar service workers viejos inmediatamente
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  });
}
// Limpiar cachés viejas
if('caches' in window){
  caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Oficiales">
<meta name="mobile-web-app-capable" content="yes">

<title>Oficiales</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Oswald:wght@700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d1a;
  --bg2:#13132a;
  --bg3:#1a1a35;
  --card:#16163a;
  --border:#2a2a55;
  --gold:#fbbf24;
  --gold2:#f59e0b;
  --blue:#6366f1;
  --blue2:#818cf8;
  --cyan:#06b6d4;
  --purple:#a855f7;
  --green:#22c55e;
  --red:#ef4444;
  --txt:#e2e8f0;
  --txt2:#94a3b8;
  --txt3:#475569;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);height:100vh;overflow:hidden;}
#scroll-wrap{position:fixed;top:0;left:0;right:0;bottom:72px;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;}
#scroll-wrap-inner{padding-bottom:16px;}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.7s}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{width:120px;height:120px;margin-bottom:20px;animation:floatIn 0.8s ease}
.splash-title{font-family:'Black Han Sans',cursive;font-size:30px;background:linear-gradient(135deg,#fbbf24,#818cf8,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;text-align:center;margin-bottom:6px}
.splash-sub{font-size:11px;color:var(--txt3);letter-spacing:3px;text-transform:uppercase}
.splash-bar{width:200px;height:4px;background:rgba(255,255,255,0.08);border-radius:4px;margin-top:28px;overflow:hidden}
.splash-fill{height:100%;background:linear-gradient(90deg,#6366f1,#06b6d4,#fbbf24);background-size:200%;animation:shimmerLoad 2.2s ease forwards}
@keyframes floatIn{from{opacity:0;transform:translateY(20px) scale(0.8)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shimmerLoad{from{width:0;background-position:0%}to{width:100%;background-position:100%}}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--border);padding:12px 16px 10px;text-align:center;position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
.header-logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.header h1{font-family:'Black Han Sans',cursive;font-size:19px;background:linear-gradient(90deg,#fbbf24,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.header-sub{display:flex;align-items:center;justify-content:center;gap:8px}
.header p{font-size:10px;color:var(--txt3);letter-spacing:1px}
.btn-refresh{background:linear-gradient(135deg,#6366f1,#818cf8);border:none;border-radius:8px;color:#fff;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-refresh:active{opacity:0.8}

/* ── NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 60%,rgba(13,13,26,0.95));border-top:1px solid var(--border);display:flex;z-index:10;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 2px 8px;cursor:pointer;border:none;background:none;color:var(--txt3);font-family:'Nunito',sans-serif;transition:all 0.2s;position:relative}
.nav-item.active{color:var(--gold)}
.nav-item.active::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:linear-gradient(90deg,#6366f1,#fbbf24);border-radius:2px}
.nav-icon{font-size:20px;margin-bottom:2px;line-height:1}
.nav-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}

/* ── PANELES ── */
.panel{display:none;padding:12px 14px;}

/* ── ESTADO BAR ── */
.estado-bar{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:12px;padding:8px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.estado-txt{font-size:11px;color:var(--blue2);font-weight:700}
.estado-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}

/* ── SORTEO ITEM ── */
.sorteo-item{background:linear-gradient(135deg,var(--card),var(--bg3));border-radius:14px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.sorteo-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#6366f1,#06b6d4);border-radius:3px 0 0 3px}
.sorteo-item:active{transform:scale(0.98);border-color:var(--blue2)}
.si-nombre{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:3px}
.si-info{font-size:10px;color:var(--txt3)}
.si-right{text-align:right}
.si-num{font-family:'Oswald',sans-serif;font-weight:700;font-size:28px;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px}
.si-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block}
.si-badge.lot{background:linear-gradient(135deg,#1e3a5f,#1e4080);color:#93c5fd;border:1px solid #2a4a8f}
.si-badge.ch{background:linear-gradient(135deg,#14532d,#166534);color:#86efac}
.si-badge.ast{background:linear-gradient(135deg,#3b1f5e,#4c1d95);color:#c4b5fd}

/* ── SECCION TITULO ── */
.seccion-titulo{font-family:'Black Han Sans',cursive;font-size:13px;color:var(--blue2);letter-spacing:2px;padding:7px 12px;background:linear-gradient(135deg,var(--bg2),var(--bg3));border-radius:10px;margin-bottom:10px;border-left:3px solid var(--blue);display:flex;align-items:center;justify-content:space-between}
.sec-count{font-size:10px;color:var(--txt3);font-family:'Nunito',sans-serif;font-weight:700}

/* ── LOADING / ERROR ── */
.loading{text-align:center;padding:40px 20px;color:var(--txt3)}
.spinner{font-size:36px;animation:spin 1s linear infinite;display:block;margin-bottom:12px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.error-card{background:#1c0a0a;border:1.5px solid #dc2626;border-radius:12px;padding:16px;text-align:center;margin-bottom:12px}
.error-card p{font-size:13px;color:#fca5a5;line-height:1.7}
.btn-retry{background:#dc2626;border:none;border-radius:8px;color:#fff;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;font-family:'Nunito',sans-serif}

/* ── TOP CARD CANDIDATOS ── */
.top-card{background:linear-gradient(135deg,#0f0f2e,#1a1a4a);border-radius:16px;padding:16px;margin-bottom:12px;border:1.5px solid #3b3b8f;position:relative;overflow:hidden}
.top-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(99,102,241,0.2),transparent);border-radius:50%}
.top-title{font-family:'Black Han Sans',cursive;font-size:17px;background:linear-gradient(90deg,#fbbf24,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;letter-spacing:2px;margin-bottom:3px}
.top-sub{font-size:10px;color:var(--txt3);text-align:center;margin-bottom:14px}
.top-grid{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.top-num{background:linear-gradient(135deg,#1a1a4a,#2a2a6a);border:1.5px solid #6366f1;color:var(--gold);font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;letter-spacing:3px;text-align:center;padding:10px 12px;border-radius:12px;min-width:68px;position:relative;box-shadow:0 4px 15px rgba(99,102,241,0.2)}
.top-num .score-badge{position:absolute;top:-7px;right:-7px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:8px;font-weight:900;padding:2px 5px;border-radius:6px;font-family:'Nunito',sans-serif}

/* ── METODO BLOQUE ── */
.metodo-bloque{background:var(--bg2);border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border)}
.metodo-nombre{font-size:12px;color:var(--blue2);font-weight:700;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.metodo-peso{font-size:10px;padding:1px 7px;border-radius:6px;font-weight:700}
.metodo-peso.alto{background:linear-gradient(135deg,#14532d,#166534);color:#86efac}
.metodo-peso.medio{background:linear-gradient(135deg,#1e3a5f,#1e4080);color:#93c5fd}
.metodo-peso.bajo{background:linear-gradient(135deg,#3b1f5e,#4c1d95);color:#c4b5fd}
.metodo-nums{display:flex;gap:6px;flex-wrap:wrap}
.mn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:4px 10px;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--txt2);letter-spacing:2px}
.mn.destacado{border-color:var(--gold);color:var(--gold);background:rgba(251,191,36,0.08)}

/* ── EMPTY ── */
.empty-analisis{text-align:center;padding:50px 20px;color:rgba(255,255,255,0.2)}
.empty-icon{font-size:52px;display:block;margin-bottom:12px;opacity:0.3}

/* ── HIST CARD ── */
.hist-card{background:linear-gradient(135deg,var(--card),var(--bg3));border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.hist-card h3{font-size:14px;font-weight:700;background:linear-gradient(90deg,#fbbf24,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;font-family:'Black Han Sans',sans-serif;letter-spacing:1px}

/* ── MINI STATS ── */
.mini-stats{display:flex;gap:8px;margin-bottom:12px}
.mini-stat{flex:1;background:linear-gradient(135deg,var(--card),var(--bg3));border-radius:12px;padding:10px 6px;text-align:center;border:1px solid var(--border)}
.mini-stat-val{font-family:'Oswald',sans-serif;font-size:19px;background:linear-gradient(135deg,#fbbf24,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700}
.mini-stat-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab-btn{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--txt3);font-size:10px;font-weight:700;padding:8px 4px;cursor:pointer;font-family:'Nunito',sans-serif;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.18s}
.tab-btn.active{background:linear-gradient(135deg,#6366f1,#818cf8);border-color:#6366f1;color:#fff;box-shadow:0 4px 12px rgba(99,102,241,0.3)}

/* ── AVISO ── */
.aviso{font-size:10px;color:rgba(255,255,255,0.15);text-align:center;padding:10px;line-height:1.6}
.badge-new{background:var(--green);color:#000;font-size:8px;font-weight:900;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle}

/* ── METHOD SCORE ── */
.method-score-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.method-score-row:last-child{border-bottom:none}
.ms-name{font-size:12px;color:var(--txt);font-weight:700;width:110px;flex-shrink:0}
.ms-bar-wrap{flex:1;margin:0 8px;background:var(--bg3);border-radius:4px;height:8px;overflow:hidden}
.ms-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#6366f1,#fbbf24)}
.ms-pct{font-size:11px;color:var(--gold);font-weight:700;width:32px;text-align:right}

/* ── BOTÓN HISTORICO ── */
.btn-historico{width:100%;padding:13px;background:linear-gradient(135deg,#1e3a5f,#1e4080);border:1px solid #3b82f6;border-radius:12px;color:#93c5fd;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s}
.btn-historico:active{opacity:0.8;transform:scale(0.98)}

/* ── DOBLE CHANCE ── */
.doble-card{background:linear-gradient(135deg,#0f1a3a,#1a2855);border-radius:16px;padding:14px;margin-bottom:14px;border:1.5px solid #3b5bdb;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden}
.doble-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:radial-gradient(circle,rgba(99,102,241,0.15),transparent);border-radius:50%}
.doble-card:active{transform:scale(0.98);border-color:#818cf8}
.doble-dia{font-size:9px;font-weight:700;color:#818cf8;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.doble-titulo{font-family:'Black Han Sans',cursive;font-size:14px;background:linear-gradient(90deg,#93c5fd,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px;margin-bottom:12px}
.doble-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;background:rgba(255,255,255,0.04);border-radius:10px;padding:8px 12px;border:1px solid rgba(99,102,241,0.2)}
.doble-lot-nombre{font-size:12px;font-weight:700;color:var(--txt)}
.doble-lot-num{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px}
.doble-separator{text-align:center;font-size:11px;color:#6366f1;font-weight:900;letter-spacing:2px;margin:2px 0}
.doble-combinado{background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(129,140,248,0.1));border-radius:10px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;margin-top:6px;border:1px solid rgba(99,102,241,0.3)}
.doble-comb-lbl{font-size:10px;color:#93c5fd;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.doble-comb-num{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#818cf8;letter-spacing:4px}
.doble-sin-datos{font-size:11px;color:var(--txt3);font-style:italic}

/* ── TARDANZA ── */
.rezago-item{background:var(--bg2);border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border)}
.rezago-num{font-family:'Oswald',sans-serif;font-size:18px;color:var(--txt);letter-spacing:2px}
.rezago-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block}
.rezago-tag.critico{background:#7f1d1d;color:#fca5a5}
.rezago-tag.alto{background:#451a03;color:#fed7aa}
.rezago-tag.medio{background:#1e3a5f;color:#93c5fd}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-end}
.modal.show{display:flex}
.modal-box{background:linear-gradient(180deg,var(--bg2),var(--bg));border-radius:24px 24px 0 0;padding:20px 16px 30px;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;border-top:2px solid var(--border)}
.modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.modal-nombre{font-family:'Black Han Sans',cursive;font-size:16px;background:linear-gradient(90deg,#fbbf24,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
.modal-close{background:var(--bg3);border:1px solid var(--border);color:var(--txt2);font-size:20px;cursor:pointer;line-height:1;padding:4px 10px;border-radius:8px}
.modal-num{font-family:'Oswald',sans-serif;font-weight:700;font-size:48px;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:6px;margin-bottom:3px}
.modal-fecha{font-size:11px;color:var(--txt3);margin-bottom:16px}

/* ── FREQ/REZAGO BARS ── */
.freq-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.freq-num{font-family:'Oswald',sans-serif;font-size:14px;color:var(--gold);width:40px;text-align:right;flex-shrink:0}
.freq-bar-wrap{flex:1;background:var(--bg3);border-radius:4px;height:12px;overflow:hidden}
.freq-bar{height:100%;border-radius:4px}
.freq-bar.hot{background:linear-gradient(90deg,#f59e0b,#ef4444)}
.freq-bar.cold{background:linear-gradient(90deg,#3b82f6,#6366f1)}
.freq-count{font-size:10px;color:var(--txt3);width:24px;flex-shrink:0}

/* ── CARD BASE ── */
.card{background:linear-gradient(135deg,var(--card),var(--bg3));border-radius:14px;padding:13px;margin-bottom:12px;border:1px solid var(--border)}
.lbl{font-size:11px;font-weight:700;color:var(--blue2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

/* ── PROGRESS ── */
.progress-card{background:linear-gradient(135deg,#0f1a0f,#0f1a0f);border:1px solid #166534;border-radius:12px;padding:14px;margin-bottom:12px}
.progress-title{font-size:12px;color:#86efac;font-weight:700;margin-bottom:8px}
.progress-bar-wrap{background:var(--bg3);border-radius:6px;height:14px;overflow:hidden;margin-bottom:6px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:6px;transition:width 0.3s}
.progress-log{font-size:10px;color:#4ade80;max-height:80px;overflow-y:auto;line-height:1.8}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <svg class="splash-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sg1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#6366f1"/>
        <stop offset="50%" style="stop-color:#06b6d4"/>
        <stop offset="100%" style="stop-color:#fbbf24"/>
      </linearGradient>
      <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#fbbf24"/>
        <stop offset="100%" style="stop-color:#f59e0b"/>
      </linearGradient>
    </defs>
    <!-- Hexágono exterior -->
    <polygon points="100,8 182,54 182,146 100,192 18,146 18,54" fill="none" stroke="url(#sg1)" stroke-width="4" opacity="0.8"/>
    <!-- Hexágono interior -->
    <polygon points="100,28 162,64 162,136 100,172 38,136 38,64" fill="url(#sg1)" opacity="0.15"/>
    <!-- T geométrica -->
    <rect x="42" y="58" width="116" height="22" rx="8" fill="url(#sg1)"/>
    <rect x="79" y="58" width="42" height="90" rx="8" fill="url(#sg2)"/>
    <!-- Puntos decorativos -->
    <circle cx="100" cy="20" r="5" fill="#6366f1" opacity="0.9"/>
    <circle cx="170" cy="60" r="4" fill="#06b6d4" opacity="0.7"/>
    <circle cx="170" cy="140" r="4" fill="#fbbf24" opacity="0.7"/>
    <circle cx="100" cy="180" r="5" fill="#818cf8" opacity="0.9"/>
    <circle cx="30" cy="140" r="4" fill="#06b6d4" opacity="0.7"/>
    <circle cx="30" cy="60" r="4" fill="#6366f1" opacity="0.7"/>
  </svg>
  <div class="splash-title">OFICIALES</div>
  <div class="splash-sub">De la Suerte · v2.0</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<div id="scroll-wrap"><div id="scroll-wrap-inner">
<!-- HEADER -->
<div class="header">
  <div class="header-logo-row">
    <h1>OFICIALES</h1>
  </div>
  <div class="header-sub">
    <p id="fecha-header">Cargando...</p>
    <button class="btn-refresh" onclick="cargarDatos()">↻ Actualizar</button>
  </div>
  <div style="font-size:9px;color:var(--txt3);text-align:center;margin-top:2px" id="ultima-actualizacion"></div>

function cargarSemilla(){
  // Sin control de versión — siempre sobreescribe con los datos de la semilla
  // Esto garantiza que al actualizar la app, el historial se actualiza también
  const h = getHist();
  let total = 0;
  Object.entries(SEMILLA_HISTORICO).forEach(([sorteo, registros])=>{
    const mapa = {};
    // Preservar registros más recientes que no están en la semilla
    if(h[sorteo]) h[sorteo].forEach(r=>{ mapa[r.fecha]=r; });
    // Sobreescribir con semilla (los datos de semilla tienen prioridad)
    const ordenados=[...registros].reverse();
    for(let i=0;i<ordenados.length;i++){
      const r=ordenados[i];
      const prev=ordenados[i-1];
      const cands=prev?generarCandidatos(prev.numero):(mapa[r.fecha]?.candidatos||{});
      mapa[r.fecha]={numero:r.numero,fecha:r.fecha,timestamp:0,candidatos:cands};
      total++;
    }
    h[sorteo]=Object.values(mapa).sort((a,b)=>b.fecha.localeCompare(a.fecha));
    if(h[sorteo].length>MAX_HIST) h[sorteo]=h[sorteo].slice(0,MAX_HIST);
  });
  saveHist(h);
  // Limpiar todas las claves viejas de semilla
  ['v1','v2','v3','v4','v5'].forEach(v=>localStorage.removeItem('oficiales_semilla_'+v));
  console.log('Semilla cargada: '+total+' registros en '+Object.keys(SEMILLA_HISTORICO).length+' loterías');
}

// Distancia dígito a dígito (posiciones distintas, máx 4)
function distanciaDig(a,b){let d=0;for(let i=0;i<4;i++)if(a[i]!==b[i])d++;return d;}

// Métodos originales conservados para compatibilidad con historial de pesos

  {id:'pitagorico', name:'∑ Pitagórico',   fn:num=>{const d=digs(num);let r=d.reduce((a,b)=>a+b,0);while(r>9)r=String(r).split('').map(Number).reduce((a,b)=>a+b,0);return[pad4(parseInt(num)+r*111),pad4(parseInt(num)+r*1111),pad4(parseInt(num)-r*111)]}},
  {id:'lunar',      name:'🌙 Lunar',        fn:num=>{const h=new Date();const f=Math.round(((h.getTime()-new Date(2000,0,6).getTime())/(1000*60*60*24)%29.53)*10/29.53);return[pad4((parseInt(num)+f*137)%10000),pad4((parseInt(num)+h.getDate()*(h.getMonth()+1))%10000),pad4((parseInt(num)+f*h.getDate())%10000)]}},
  {id:'modular',    name:'🔢 Modular',      fn:num=>{const d=digs(num),p=[3,7,11,13];return[pad4(parseInt(d.map((x,i)=>(x*p[i])%10).join(''))),pad4(parseInt(d.map((x,i)=>(x*p[3-i]+p[i])%10).join(''))),pad4(((d[0]*3+d[1]*7)%100)*100+((d[2]*11+d[3]*13)%100))]}},
];

// ── Markov O1: siguiente dígito por posición ──────────────
function getMarkovO1(sorteo,ultimoNum){
  const regs=(getHist()[sorteo]||[]);
  if(regs.length<4) return null;
  const trans=[0,1,2,3].map(pos=>{
    const freq={};
    for(let i=0;i<regs.length-1;i++){
      const desde=regs[i+1].numero[pos];
      const hacia=regs[i].numero[pos];
      if(desde===ultimoNum[pos]) freq[hacia]=(freq[hacia]||0)+1;
    }
    if(!Object.keys(freq).length){
      const f2={};
      regs.forEach(r=>{f2[r.numero[pos]]=(f2[r.numero[pos]]||0)+1;});
      return Object.entries(f2).sort((a,b)=>b[1]-a[1])[0]?.[0]||'0';
    }
    return Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0];
  });
  return trans.join('');
}

// ── Markov O2: par de 2 últimos números ───────────────────
function getMarkovO2(sorteo,ultimoNum,prevNum){
  const regs=(getHist()[sorteo]||[]);
  if(regs.length<6||!prevNum) return null;
  const clave=prevNum+ultimoNum;
  const freq={};
  for(let i=0;i<regs.length-2;i++){
    const par=regs[i+2].numero+regs[i+1].numero;
    if(par===clave) freq[regs[i].numero]=(freq[regs[i].numero]||0)+1;
  }
  if(!Object.keys(freq).length) return null;
  return Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0];
}

// ── Ciclos: ciclo dominante en historial ──────────────────
function getCiclo(sorteo,ultimoNum){
  const regs=(getHist()[sorteo]||[]);
  if(regs.length<8) return null;
  const ciclos=[3,5,7,10,14];
  let mejorCiclo=null,mejorSim=0;
  ciclos.forEach(c=>{
    if(regs.length<=c) return;
    const sim=4-distanciaDig(regs[c].numero,ultimoNum);
    if(sim>mejorSim){mejorSim=sim;mejorCiclo=c;}
  });
  if(!mejorCiclo||mejorSim<2) return null;
  const tard=calcTardanza(sorteo);
  const base=regs[mejorCiclo-1]?.numero||regs[0].numero;
  if(!tard) return base;
  const digTop=tard.tardanzaPos.map(l=>l[0]?.[0]||null);
  const tardMax=tard.tardanzaPos.map((l,p)=>({p,t:l[0]?.[1]||0})).sort((a,b)=>b.t-a.t);
  let res=base.split('');
  tardMax.slice(0,2).forEach(({p})=>{if(digTop[p]) res[p]=digTop[p];});
  return res.join('');
}

// ── Entropía: dígitos más subrepresentados ────────────────
function getEntropia(sorteo){
  const regs=(getHist()[sorteo]||[]);
  if(regs.length<5) return null;
  const result=[0,1,2,3].map(pos=>{
    const freq={};
    for(let d=0;d<=9;d++) freq[String(d)]=0;
    regs.forEach(r=>{freq[r.numero[pos]]=(freq[r.numero[pos]]||0)+1;});
    const esperado=regs.length*0.1;
    return Object.entries(freq)
      .map(([d,f])=>({d,deficit:esperado-f}))
      .sort((a,b)=>b.deficit-a.deficit)[0].d;
  });
  return result.join('');
}

// ── Tardanza Pura: dígito más tardado por posición ────────
function getTardanzaPura(sorteo){
  const tard=calcTardanza(sorteo);
  if(!tard) return null;
  return tard.tardanzaPos.map(l=>l[0]?.[0]||'0').join('');
}

// MOTOR PRINCIPAL — 10 candidatos con diversidad forzada
// ═══════════════════════════════════════════════════════════
function getTop10(sorteo,num){
  const regs=(getHist()[sorteo]||[]);
  const prevNum=regs[1]?.numero||null;
  const resultado=getPesos(sorteo);

  // Pool base de métodos originales
  const pool={};
  METODOS.forEach(m=>{
    const peso=resultado?(resultado.pesos[m.id]):(1/METODOS.length);
    m.fn(num).forEach(c=>{
      if(!pool[c]) pool[c]={score:0};
      pool[c].score+=peso;
    });
  });
  const rezago=calcRezago(sorteo);
  if(rezago) rezago.forEach(([n,i])=>{if(pool[n]) pool[n].score+=Math.min(0.25,i*0.025);});
  const poolOrdenado=Object.entries(pool).sort((a,b)=>b[1].score-a[1].score).map(([n])=>n);

  // Nuevos métodos avanzados
  const m1=getMarkovO1(sorteo,num);
  const m2=getMarkovO2(sorteo,num,prevNum);
  const mc=getCiclo(sorteo,num);
  const me=getEntropia(sorteo);
  const mt=getTardanzaPura(sorteo);
  const cr=getCruzado(sorteo,num);
  const cv=getConvergencia(sorteo,num);

  // Lista de candidatos brutos en orden de prioridad
  const brutos=[
    {num:m1,          label:'🔵 Markov O1'},
    {num:m2,          label:'🔵 Markov O2'},
    {num:mc,          label:'🔄 Ciclos'},
    {num:me,          label:'📊 Entropía'},
    {num:mt,          label:'⏱️ Tardanza'},
    {num:cr?.num,     label:'🔀 Cruzado'},
    {num:cv?.num,     label:'⚡ Convergencia'},
    {num:poolOrdenado[0], label:'🟢 Ensamble'},
    ...poolOrdenado.slice(1,8).map((n,i)=>({num:n,label:`⭐ Top${i+2}`})),
  ].filter(c=>c.num&&c.num.length===4);

  // Filtro anti-similitud: ≥2 posiciones distintas al último Y entre candidatos
  const finales=[];
  const usados=new Set();
  // Pasada 1: filtro estricto (≥2 dist al último Y ≥2 entre candidatos)
  for(const c of brutos){
    if(finales.length>=10) break;
    if(usados.has(c.num)) continue;
    if(distanciaDig(c.num,num)<2) continue;
    if(finales.some(f=>distanciaDig(c.num,f.num)<2)) continue;
    finales.push(c); usados.add(c.num);
  }
  // Pasada 2: solo anti-último (relajar filtro entre candidatos si faltan)
  for(const c of brutos){
    if(finales.length>=10) break;
    if(usados.has(c.num)) continue;
    if(distanciaDig(c.num,num)<2) continue;
    finales.push(c); usados.add(c.num);
  }
  return finales;
}

// Alias para compatibilidad con otras partes del código
function getTop5(sorteo,num){
  return getTop10(sorteo,num).slice(0,5).map((c,i)=>({num:c.num,score:0.9-(i*0.1)}));
}

function getHist(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(e){return{}}}
function saveHist(h){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(h))}catch(e){}}

// Limpia duplicados del historial: mismo número en fechas contiguas (hoy/ayer)
// y entradas con fechas no-ISO (ej. "sábado 02/05/2026")
function limpiarHistorial(){
  const h=getHist();
  let cambios=0;
  Object.keys(h).forEach(sorteo=>{
    // 1. Eliminar fechas no ISO
    const antes=h[sorteo].length;
    h[sorteo]=h[sorteo].filter(r=>/^\d{4}-\d{2}-\d{2}$/.test(r.fecha));
    cambios+=antes-h[sorteo].length;

    // 2. Eliminar duplicados exactos fecha+numero
    const vistas=new Set();
    h[sorteo]=h[sorteo].filter(r=>{
      const key=`${r.fecha}|${r.numero}`;
      if(vistas.has(key)){cambios++;return false;}
      vistas.add(key);return true;
    });

    // 3. Eliminar consecutivos con mismo número (dejar solo el más antiguo)
    h[sorteo]=h[sorteo].filter((r,i,arr)=>{
      if(i===arr.length-1) return true; // último siempre queda
      if(r.numero===arr[i+1].numero){cambios++;return false;} // borra el más reciente
      return true;
    });

    // 4. Orden descendente por fecha
    h[sorteo].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  });
  if(cambios>0){saveHist(h);console.log(`Limpiados: ${cambios}`);}
}

function registrarResultado(sorteo, numero, fecha, candidatos){
  const h=getHist();
  if(!h[sorteo]) h[sorteo]=[];
  // No guardar si ya existe esa fecha
  if(h[sorteo].find(r=>r.fecha===fecha)) return false;
  // No guardar si el número más reciente es exactamente el mismo
  // (astroluna muestra el resultado de ayer mientras hoy no ha jugado)
  if(h[sorteo][0]?.numero===numero) return false;
  h[sorteo].unshift({numero, fecha, timestamp:Date.now(), candidatos:candidatos||{}});
  if(h[sorteo].length>MAX_HIST) h[sorteo]=h[sorteo].slice(0,MAX_HIST);
  saveHist(h);
  return true;
}

function generarCandidatos(num){
  const c={};
  METODOS.forEach(m=>{c[m.id]=m.fn(num);});
  return c;
}

// ═══════════════════════════════════════════════════════════
// EVALUADOR DE MÉTODOS
// ═══════════════════════════════════════════════════════════
function evaluarMetodos(sorteo){
  const regs=(getHist()[sorteo]||[]);
  if(regs.length<2) return null;
  const scores={};
  METODOS.forEach(m=>{scores[m.id]={hits:0,total:0,pct:0}});
  for(let i=0;i<regs.length-1;i++){
    const actual=regs[i].numero;
    const ant=regs[i+1];
    if(!ant.candidatos) continue;
    METODOS.forEach(m=>{
      const c=ant.candidatos[m.id]||[];
      scores[m.id].total++;
      if(c.includes(actual)) scores[m.id].hits++;
    });
  }
  METODOS.forEach(m=>{if(scores[m.id].total>0) scores[m.id].pct=Math.round(scores[m.id].hits/scores[m.id].total*100)});
  return scores;
}

function getPesos(sorteo){
  const sc=evaluarMetodos(sorteo);
  if(!sc) return null;
  const total=METODOS.reduce((s,m)=>s+(sc[m.id].pct||1),0)||1;
  const pesos={};
  METODOS.forEach(m=>{pesos[m.id]=(sc[m.id].pct||1)/total});
  return{pesos,scores:sc};
}

// FRECUENCIA Y REZAGO
// ═══════════════════════════════════════════════════════════
function calcFreq(sorteo,dias=60){
  const regs=(getHist()[sorteo]||[]).slice(0,dias);
  if(!regs.length) return null;
  const freq={};
  regs.forEach(r=>{freq[r.numero]=(freq[r.numero]||0)+1});
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  return{sorted,max:sorted[0]?.[1]||1,total:regs.length};
}

function calcRezago(sorteo){
  const regs=(getHist()[sorteo]||[]);
  if(regs.length<5) return null;
  const ultima={};
  regs.forEach((r,i)=>{if(!ultima[r.numero]) ultima[r.numero]=i});
  return Object.entries(ultima).filter(([,i])=>i>=3).sort((a,b)=>b[1]-a[1]).slice(0,10);
}

// ═══════════════════════════════════════════════════════════
// TOP 5 INTELIGENTE
// ═══════════════════════════════════════════════════════════
function getTop5(sorteo, num){
  const res=getPesos(sorteo);
  const freq=calcFreq(sorteo,60);
  const rezago=calcRezago(sorteo);
  const map={};
  METODOS.forEach(m=>{
    const cands=m.fn(num);
    const peso=res?(res.pesos[m.id]):(1/METODOS.length);
    cands.forEach(c=>{
      if(!map[c]) map[c]={score:0};
      map[c].score+=peso;
    });
  });
  if(rezago) rezago.forEach(([n,i])=>{if(map[n]) map[n].score+=Math.min(0.3,i*0.03)});
  if(freq) freq.sorted.slice(0,5).forEach(([n])=>{if(map[n]) map[n].score*=0.85});
  return Object.entries(map).sort((a,b)=>b[1].score-a[1].score).slice(0,5).map(([n,d])=>({num:n,score:d.score}));
}

function scoreV(s,max){return Math.min(100,Math.round(s/(max||1)*100))}

// 🔀 CRUZADO: toma candidatos del Top5 y sube los que tienen
//    más dígitos coincidentes con los más tardados por posición
function getCruzado(sorteo, num){
  const tard = calcTardanza(sorteo);
  const top5 = getTop5(sorteo, num);

  if(!tard || top5.length===0) return null;

  // Dígito más tardado por cada posición
  const digTop = tard.tardanzaPos.map(lista => lista[0]?.[0] || null);

  // Puntuar cada candidato del top5 por cuántas posiciones
  // coinciden con el dígito más tardado
  const scored = top5.map(t => {
    let cruces = 0;
    for(let p=0;p<4;p++){
      if(digTop[p] && t.num[p] === digTop[p]) cruces++;
    }
    return {...t, cruces};
  }).sort((a,b) => b.cruces - a.cruces || b.score - a.score);

  // El ganador del cruce es el que más posiciones tardadas tiene
  const ganador = scored[0];
  // Solo retornar si hay al menos 1 cruce real; si no, construir
  // un número híbrido: 2 dígitos del mejor candidato + 2 de tardanza
  if(ganador.cruces >= 1) return {num: ganador.num, cruces: ganador.cruces};

  // Sin cruces: armar híbrido con las 2 posiciones más tardadas de digTop
  // y las 2 restantes del mejor candidato
  const tardMax = tard.tardanzaPos.map((lista,p)=>({p, tard:lista[0]?.[1]||0}))
    .sort((a,b)=>b.tard-a.tard);
  const posTard = new Set(tardMax.slice(0,2).map(x=>x.p));
  let hibrido = '';
  for(let p=0;p<4;p++){
    hibrido += posTard.has(p) ? (digTop[p]||'0') : ganador.num[p];
  }
  return {num: hibrido, cruces: 0};
}

// ⚡ CONVERGENCIA: busca el número que aparece en MÁS métodos
//    a la vez (sin pesos), luego desempata por tardanza de dígitos
function getConvergencia(sorteo, num){
  const tard = calcTardanza(sorteo);

  // Contar en cuántos métodos aparece cada candidato
  const conteo = {};
  METODOS.forEach(m => {
    m.fn(num).forEach(c => { conteo[c] = (conteo[c]||0) + 1; });
  });

  // Ordenar por apariciones, desempatando con tardanza de dígitos
  const candidatos = Object.entries(conteo).sort((a,b) => {
    if(b[1] !== a[1]) return b[1] - a[1];
    // desempate: más dígitos tardados gana
    const puntTard = n => {
      if(!tard) return 0;
      return [0,1,2,3].reduce((s,p) => {
        const idx = tard.tardanzaPos[p].findIndex(([d])=>d===n[p]);
        return s + (idx === 0 ? 3 : idx === 1 ? 1 : 0); // top1=3pts, top2=1pt
      }, 0);
    };
    return puntTard(a[0]) - puntTard(b[0]);
  });

  const ganador = candidatos[0];
  if(!ganador) return null;

  // No repetir si ya está en el Top5 — buscar el siguiente
  const top5nums = getTop5(sorteo, num).map(t=>t.num);
  const unico = candidatos.find(([n]) => !top5nums.includes(n));
  if(unico) return {num: unico[0], apariciones: unico[1]};
  return {num: ganador[0], apariciones: ganador[1]};
}

async function fetchConProxy(url){
  const PROXIES=[
    ()=>fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(12000)}).then(r=>r.json()).then(j=>j.contents),
    ()=>fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(12000)}).then(r=>r.text()),
    ()=>fetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(12000)}).then(r=>r.text()),
  ];
  for(const proxy of PROXIES){
    try{const r=await proxy();if(r&&r.length>200) return r;}catch(e){}
  }
  return null;
}

// Meses en español para parsear fechas de chancehoy.com
const MESES_ES = {
  'enero':'01','febrero':'02','marzo':'03','abril':'04','mayo':'05','junio':'06',
  'julio':'07','agosto':'08','septiembre':'09','octubre':'10','noviembre':'11','diciembre':'12'
};

// Parsea la tabla de últimos 20 sorteos de chancehoy.com/sorteo/<slug>/
// Formato: <td>AYER SÁBADO 02 DE MAYO DE 2026</td><td>0745 5</td>
function parsearHistorico(html){
  const parser=new DOMParser();
  const doc=parser.parseFromString(html,'text/html');
  const filas=doc.querySelectorAll('table tr');
  const resultados=[];
  filas.forEach(fila=>{
    const celdas=fila.querySelectorAll('td');
    if(celdas.length>=2){
      const fechaTxt=(celdas[0].textContent||'').trim().toUpperCase();
      const numTxt=(celdas[1].textContent||'').trim();

      // Extraer número de 4 dígitos (ignorar la quinta si la hay: "0745 5")
      const numM=numTxt.match(/\b(\d{4})\b/);

      // Extraer fecha: "02 DE MAYO DE 2026"
      const fechaM=fechaTxt.match(/(\d{1,2})\s+DE\s+(\w+)\s+DE\s+(\d{4})/);

      if(numM&&fechaM){
        const d=fechaM[1].padStart(2,'0');
        const mesKey=fechaM[2].toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g,''); // quitar tildes
        const m=MESES_ES[mesKey]||null;
        const y=fechaM[3];
        if(m) resultados.push({numero:numM[1], fecha:`${y}-${m}-${d}`});
      }
    }
  });
  return resultados;
}

async function actualizarHistoricoSorteo(nombre, urlSlug, logFn){
  const url=BASE_HIST+urlSlug+'/';
  const html=await fetchConProxy(url);
  if(!html){logFn(`⚠️ Sin respuesta: ${nombre}`);return 0}
  const resultados=parsearHistorico(html);
  if(!resultados.length){logFn(`⚠️ Sin datos: ${nombre}`);return 0}
  let nuevos=0;
  // Registrar de más antiguo a más reciente para que candidatos sean coherentes
  const ordenados=[...resultados].reverse();
  for(let i=0;i<ordenados.length;i++){
    const r=ordenados[i];
    // Candidatos generados del resultado ANTERIOR (si existe)
    const prev=ordenados[i-1];
    const cands=prev?generarCandidatos(prev.numero):{};
    const ok=registrarResultado(nombre,r.numero,r.fecha,cands);
    if(ok) nuevos++;
  }
  logFn(`✅ ${nombre}: +${nuevos} nuevos (${resultados.length} obtenidos)`);
  return nuevos;
}

async function actualizarTodoElHistorico(){
  if(cargandoHistorico) return;
  cargandoHistorico=true;

  const btn=document.getElementById('btn-hist-update');
  if(btn){btn.disabled=true;btn.classList.add('cargando');btn.innerHTML='⏳ Descargando histórico...';}

  // Mostrar progress card
  const progressEl=document.getElementById('progress-hist');
  if(progressEl){progressEl.style.display='block';}

  const sorteos=Object.entries(SORTEO_URL);
  let procesados=0, totalNuevos=0;

  for(const [nombre,slug] of sorteos){
    const pct=Math.round((procesados/sorteos.length)*100);
    const barEl=document.getElementById('hist-bar');
    const logEl=document.getElementById('hist-log');
    if(barEl) barEl.style.width=pct+'%';

    const logFn=(msg)=>{
      if(logEl){
        logEl.innerHTML+=msg+'<br>';
        logEl.scrollTop=logEl.scrollHeight;
      }
    };

    const nuevos=await actualizarHistoricoSorteo(nombre,slug,logFn);
    totalNuevos+=nuevos;
    procesados++;

    // Pausa breve para no saturar proxies
    await new Promise(r=>setTimeout(r,400));
  }

  // Barra al 100%
  const barEl=document.getElementById('hist-bar');
  if(barEl) barEl.style.width='100%';

  const logEl=document.getElementById('hist-log');
  if(logEl) logEl.innerHTML+=`<br>🎉 Listo. ${totalNuevos} registros nuevos guardados.`;

  if(btn){
    btn.disabled=false;
    btn.classList.remove('cargando');
    btn.innerHTML='🔄 Actualizar histórico (últimos 10 por sorteo)';
  }

  cargandoHistorico=false;

  // Refrescar stats después de cargar
  setTimeout(()=>renderHistorialPanel(), 800);
}

let datosGlobales={chances:[],loterias:[]};

async function cargarDatos(){
  
  document.getElementById('lista-loterias').innerHTML='<div class="loading"><span class="spinner">⚙️</span>Cargando loterías...</div>';
  
  document.getElementById('estado-loterias').textContent='Consultando...';

  const hoy=new Date();
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('fecha-header').textContent=`${dias[hoy.getDay()]} ${hoy.getDate()} de ${meses[hoy.getMonth()]}`;
  // Timestamp de última actualización
  const hh=String(hoy.getHours()).padStart(2,'0');
  const mm=String(hoy.getMinutes()).padStart(2,'0');
  document.getElementById('ultima-actualizacion').textContent=`Actualizado ${hh}:${mm}`;

  const TARGET='https://www.astroluna.co/resultados-loterias-chance';
  const htmlData=await fetchConProxy(TARGET);

  if(!htmlData){
    const err=`<div class="error-card"><p>⚠️ No se pudo conectar.<br>Verifica tu internet e intenta de nuevo.</p><button class="btn-retry" onclick="cargarDatos()">↻ REINTENTAR</button></div>`;
    document.getElementById('lista-chances').innerHTML=err;
    document.getElementById('lista-loterias').innerHTML=err;
    
    document.getElementById('estado-loterias').textContent='Sin conexión';
    return;
  }

  try{
    const parser=new DOMParser();
    const doc=parser.parseFromString(htmlData,'text/html');
    const filas=doc.querySelectorAll('table tr');
    const todos=[];
    filas.forEach(f=>{
      const c=f.querySelectorAll('td');
      if(c.length>=3){
        const nombre=(c[0].textContent||'').trim();
        const resultado=(c[1].textContent||'').trim();
        const serie=(c[2].textContent||'').trim();
        const fecha=(c[3]?c[3].textContent:'').trim();
        if(nombre&&resultado&&!esExcluido(nombre)&&resultado.length===4&&/^\d{4}$/.test(resultado))
          todos.push({nombre,resultado,serie,fecha});
      }
    });

    const chances=todos.filter(r=>!esLoteria(r.nombre));
    const loterias=todos.filter(r=>esLoteria(r.nombre));

    function ordenar(lista,orden){
      const out=[];
      orden.forEach(o=>{const f=lista.find(r=>r.nombre.toLowerCase().includes(o.toLowerCase().split(' ')[0]));if(f) out.push(f)});
      lista.forEach(r=>{if(!out.find(o=>o.nombre===r.nombre)) out.push(r)});
      return out;
    }

    datosGlobales.chances=ordenar(chances,ORDEN_CHANCES);
    datosGlobales.loterias=ordenar(loterias,ORDEN_LOTERIAS);

    // Auto-guardar resultado de hoy
    const fechaHoy=new Date().toISOString().slice(0,10);
    [...datosGlobales.chances,...datosGlobales.loterias].forEach(r=>{
      registrarResultado(r.nombre,r.resultado,fechaHoy,generarCandidatos(r.resultado));
    });

    renderLoterias();
    // Refrescar Doble Chance si está visible
    if(document.getElementById('panel-doble').style.display==='block') renderDobleChance();
  }catch(e){
    const err=`<div class="error-card"><p>⚠️ Error al procesar datos.</p><button class="btn-retry" onclick="cargarDatos()">↻ Reintentar</button></div>`;
    document.getElementById('lista-chances').innerHTML=err;
    document.getElementById('lista-loterias').innerHTML=err;
  }
}

function renderFrecuencia(sorteo){
  const regs=(getHist()[sorteo]||[]);
  if(regs.length<3){
    document.getElementById('modal-body').innerHTML=`<div class="empty-analisis"><span class="empty-icon">📈</span><p>Mínimo 3 registros para ver frecuencias.</p></div>`;
    return;
  }

  // Frecuencia de dígito por posición
  const posFreq=[0,1,2,3].map(pos=>{
    const freq={};
    for(let d=0;d<=9;d++) freq[String(d)]=0;
    regs.forEach(r=>{freq[r.numero[pos]]++;});
    const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    const max=sorted[0][1]||1;
    return{sorted,max};
  });

  // Frecuencia de número completo (top 10)
  const numFreq={};
  regs.forEach(r=>{numFreq[r.numero]=(numFreq[r.numero]||0)+1;});
  const topNums=Object.entries(numFreq).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxN=topNums[0]?.[1]||1;

  let html=`<div class="mini-stats">
    <div class="mini-stat"><div class="mini-stat-val">${regs.length}</div><div class="mini-stat-lbl">Registros</div></div>
    <div class="mini-stat"><div class="mini-stat-val">${Object.keys(numFreq).length}</div><div class="mini-stat-lbl">Únicos</div></div>
    <div class="mini-stat"><div class="mini-stat-val">${topNums[0]?.[0]||'—'}</div><div class="mini-stat-lbl">Más frecuente</div></div>
  </div>`;

  // Mapa de calor de dígitos por posición
  html+=`<div class="hist-card"><h3>🔥 Calor de dígitos por posición</h3>
  <p style="font-size:10px;color:#6b7280;margin-bottom:10px">Frecuencia de cada dígito (0-9) en cada posición del número</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;

  const posLabels=['1ª','2ª','3ª','4ª'];
  posFreq.forEach(({sorted,max},pos)=>{
    html+=`<div style="background:#0f0f0f;border-radius:10px;padding:10px;border:1px solid #222">
      <div style="font-size:10px;font-weight:700;color:#d97706;margin-bottom:6px;text-transform:uppercase">${posLabels[pos]} cifra</div>`;
    sorted.forEach(([dig,cnt])=>{
      const pct=Math.round(cnt/max*100);
      const heat=pct>=80?'#ef4444':pct>=60?'#f97316':pct>=40?'#eab308':pct>=20?'#3b82f6':'#374151';
      html+=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
        <span style="font-family:'Oswald',sans-serif;font-size:14px;color:${pct>=80?'#ef4444':'#9ca3af'};width:14px;text-align:center;font-weight:700">${dig}</span>
        <div style="flex:1;background:#1a1a1a;border-radius:3px;height:9px">
          <div style="width:${Math.max(3,pct)}%;height:100%;background:${heat};border-radius:3px"></div>
        </div>
        <span style="font-size:10px;color:#4b5563;width:18px;text-align:right">${cnt}</span>
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div></div>`;

  // Top 10 números más frecuentes
  html+=`<div class="hist-card"><h3>📊 Números más repetidos</h3>`;
  topNums.forEach(([n,cnt],i)=>{
    const pct=Math.round(cnt/maxN*100);
    html+=`<div class="freq-row">
      <span class="freq-num">${n}</span>
      <div class="freq-bar-wrap"><div class="freq-bar ${i===0?'hot':'cold'}" style="width:${pct}%"></div></div>
      <span class="freq-count">${cnt}x</span>
    </div>`;
  });
  html+=`</div><div class="aviso">⚠️ La frecuencia pasada no predice el futuro.</div>`;
  document.getElementById('modal-body').innerHTML=html;
}

  // Colores por tipo de método

    '🔀':'#0f766e','⚡':'#c2410c','🟢':'#166534','⭐':'#1e3a5f'

// Calcula tardanza por número completo Y por dígito en cada posición
function calcTardanza(sorteo){
  const regs=(getHist()[sorteo]||[]);
  if(regs.length<3) return null;

  // — Tardanza de número completo (sorteos desde última aparición) —
  const ultimaNum={};
  regs.forEach((r,i)=>{ if(!(r.numero in ultimaNum)) ultimaNum[r.numero]=i; });
  const tardanzaNums = Object.entries(ultimaNum)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,15);

  // — Tardanza de dígito por posición (0..9 en pos 0..3) —
  // Para cada posición, ¿cuántos sorteos lleva sin salir cada dígito?
  const tardanzaPos = [0,1,2,3].map(pos=>{
    const ultimaDig={};
    regs.forEach((r,i)=>{
      const d=r.numero[pos];
      if(!(d in ultimaDig)) ultimaDig[d]=i;
    });
    // Dígitos que nunca salieron en el historial = tardanza máxima+1
    for(let d=0;d<=9;d++){
      const k=String(d);
      if(!(k in ultimaDig)) ultimaDig[k]=regs.length;
    }
    return Object.entries(ultimaDig).sort((a,b)=>b[1]-a[1]);
  });

  return {tardanzaNums, tardanzaPos, total:regs.length};
}

function renderTardanza(sorteo){
  const t=calcTardanza(sorteo);
  if(!t){
    document.getElementById('modal-body').innerHTML=`<div class="empty-analisis"><span class="empty-icon">⏱️</span><p>Mínimo 3 registros para calcular tardanzas.<br>Abre la app cada día para acumular historial.</p></div>`;

    <p style="font-size:13px;color:#9ca3af;margin-bottom:14px">${total} registros guardados · ~${kb} KB en tu dispositivo.</p>
    <button onclick="confirmarBorrar()" style="background:#dc2626;border:none;border-radius:8px;color:#fff;padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;width:100%">
      🗑️ Borrar todo el historial
    </button>
    <p style="font-size:10px;color:#4b5563;margin-top:8px;text-align:center">Esto reinicia el aprendizaje desde cero.</p>
  </div>`;
}

function renderStatsBuscar(){
  return `<div class="hist-card">
    <h3>🔍 Buscar número en historial</h3>
    <p style="font-size:11px;color:#6b7280;margin-bottom:12px">¿Cuándo salió un número en cada sorteo?</p>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input id="buscar-input" type="number" min="0" max="9999" placeholder="Ej: 1234"
        style="flex:1;background:#111;border:1px solid #333;border-radius:8px;color:#e5e7eb;padding:10px 12px;font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:3px;outline:none;"
        oninput="this.value=this.value.slice(0,4)"
        onkeydown="if(event.key==='Enter')buscarEnHistorial()">
      <button onclick="buscarEnHistorial()" style="background:linear-gradient(135deg,#6366f1,#818cf8);border:none;border-radius:8px;color:#fff;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif">Buscar</button>
    </div>
    <div id="buscar-resultado"></div>
  </div>`;
}

function buscarEnHistorial(){
  const raw=document.getElementById('buscar-input')?.value||'';
  const num=raw.padStart(4,'0');
  if(num.length!==4||!/^\d{4}$/.test(num)){
    document.getElementById('buscar-resultado').innerHTML='<p style="color:#ef4444;font-size:12px">Ingresa un número de 4 dígitos.</p>';
    return;
  }
  const h=getHist();
  const resultados=[];
  Object.keys(h).forEach(sorteo=>{
    (h[sorteo]||[]).forEach((r,i)=>{
      if(r.numero===num) resultados.push({sorteo,fecha:r.fecha,posicion:i+1,total:h[sorteo].length});
    });
  });
  const el=document.getElementById('buscar-resultado');
  if(!resultados.length){
    el.innerHTML=`<div style="text-align:center;padding:20px;color:#4b5563"><span style="font-size:32px;display:block;margin-bottom:8px">🔍</span><p style="font-size:13px">El número <strong style="color:#fbbf24;font-family:'Oswald',sans-serif;letter-spacing:2px">${num}</strong> no aparece en el historial.</p></div>`;
    return;
  }
  resultados.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  let html=`<p style="font-size:11px;color:#22c55e;margin-bottom:10px">✅ Encontrado ${resultados.length} vez${resultados.length>1?'es':''}</p>`;
  resultados.forEach(r=>{
    const [y,m,d]=r.fecha.split('-');
    html+=`<div style="background:#111;border-radius:8px;padding:9px 12px;margin-bottom:6px;border:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:12px;font-weight:700;color:#e5e7eb">${r.sorteo}</div>
        <div style="font-size:10px;color:#4b5563">${d}/${m}/${y} · registro #${r.posicion} de ${r.total}</div>
      </div>
      <div style="font-family:'Oswald',sans-serif;font-size:20px;color:#fbbf24;letter-spacing:3px">${num}</div>
    </div>`;
  });
  el.innerHTML=html;
}

function confirmarBorrar(){
  if(confirm('¿Borrar todo el historial? Se reinicia el análisis inteligente.')){
    localStorage.removeItem(STORAGE_KEY);
    renderHistorialPanel();
  }
}

function recargarSemilla(){
  // Borrar TODO el historial y recargar semilla desde cero
  localStorage.removeItem(STORAGE_KEY);
  ['v1','v2','v3','v4','v5'].forEach(v=>localStorage.removeItem('oficiales_semilla_'+v));
  cargarSemilla();
  renderHistorialPanel();
  const h=getHist();
  const total=Object.values(h).reduce((s,v)=>s+v.length,0);
  const sorteos=Object.keys(h).length;
  alert('✅ Listo! '+sorteos+' loterías · '+total+' registros cargados.');
}

// ═══════════════════════════════════════════════════════════
// DOBLE CHANCE
// ═══════════════════════════════════════════════════════════
const DOBLE_PARES = [
  {dia:'Sábado',   nombre:'Boyacá + Cauca',           lots:['Boyacá','Cauca']},
  {dia:'Viernes',  nombre:'Medellín + Santander',      lots:['Medellín','Santander']},
  {dia:'Viernes',  nombre:'Medellín + Risaralda',      lots:['Medellín','Risaralda']},
  {dia:'Jueves',   nombre:'Bogotá + Quindío',          lots:['Bogotá','Quindío']},
  {dia:'Miércoles',nombre:'Valle + Meta',              lots:['Valle','Meta']},
  {dia:'Miércoles',nombre:'Valle + Manizales',         lots:['Valle','Manizales']},
  {dia:'Miércoles',nombre:'Meta + Manizales',          lots:['Meta','Manizales']},
  {dia:'Lunes',    nombre:'Cruz Roja + Huila',         lots:['Cruz Roja','Huila']},
  {dia:'Lunes',    nombre:'Cundinamarca + Tolima',     lots:['Cundinamarca','Tolima']},
];

// Número combinado doble: toma las últimas 2 cifras de cada lotería → 4 cifras
function combinarDoble(num1, num2){
  if(!num1||!num2) return null;
  return (num1.slice(-2) + num2.slice(-2));
}

// Busca el resultado actual de una lotería en datosGlobales
function getResultadoLot(nombre){
  const all=[...datosGlobales.chances,...datosGlobales.loterias];
  const found=all.find(r=>r.nombre.toLowerCase().includes(nombre.toLowerCase().split(' ')[0]));
  return found||null;
}

function renderDobleChance(){
  const el=document.getElementById('doble-body');

  if(!datosGlobales.loterias.length){
    el.innerHTML=`<div class="loading"><span class="spinner">⏳</span>Esperando resultados de loterías...</div>`;
    return;
  }

  let html=`<div class="estado-bar">
    <span class="estado-txt">🎯 Doble Chance — Combinaciones del día</span>
    <span class="estado-dot"></span>
  </div>`;

  // Agrupar por día
  const dias=['Sábado','Viernes','Jueves','Miércoles','Lunes'];
  dias.forEach(dia=>{
    const pares=DOBLE_PARES.filter(p=>p.dia===dia);
    if(!pares.length) return;

    html+=`<div class="seccion-titulo" style="margin-bottom:10px">📅 ${dia.toUpperCase()} <span class="sec-count">${pares.length} par${pares.length>1?'es':''}</span></div>`;

    pares.forEach(par=>{
      const r1=getResultadoLot(par.lots[0]);
      const r2=getResultadoLot(par.lots[1]);
      const num1=r1?.resultado||null;
      const num2=r2?.resultado||null;
      const combinado=num1&&num2?combinarDoble(num1,num2):null;

      html+=`<div class="doble-card" onclick="${combinado?`abrirModalDoble('${par.nombre.replace(/'/g,"\\'")}','${combinado}','${par.lots[0].replace(/'/g,"\\'")}','${par.lots[1].replace(/'/g,"\\'")}')`:''}" style="${!combinado?'cursor:default':''}">
        <div class="doble-dia">${par.dia}</div>
        <div class="doble-titulo">🎯 ${par.nombre}</div>

        <div class="doble-row">
          <span class="doble-lot-nombre">${par.lots[0]}</span>
          <span class="doble-lot-num">${num1||'—'}</span>
        </div>

        <div class="doble-separator">+</div>

        <div class="doble-row">
          <span class="doble-lot-nombre">${par.lots[1]}</span>
          <span class="doble-lot-num">${num2||'—'}</span>
        </div>

        ${combinado
          ?`<div class="doble-combinado">
              <span class="doble-comb-lbl">🔢 Número combinado</span>
              <span class="doble-comb-num">${combinado}</span>
            </div>`
          :`<div class="doble-combinado"><span class="doble-sin-datos">Esperando resultados de ambas loterías...</span></div>`
        }
      </div>`;
    });
  });

  html+=`<div class="aviso">Combinado = últimas 2 cifras de cada lotería · Toca para ver candidatos</div>`;
  el.innerHTML=html;
}

// Abrir modal con número combinado del doble chance
function abrirModalDoble(nombre, numComb, lot1, lot2){
  // Guardar en historial como sorteo "Doble: X + Y"
  const sorteoKey=`Doble: ${lot1} + ${lot2}`;
  const fechaHoy=new Date().toISOString().slice(0,10);
  registrarResultado(sorteoKey, numComb, fechaHoy, generarCandidatos(numComb));

  mState={nombre:sorteoKey, num:numComb, fecha:fechaHoy};
  document.getElementById('modal-nombre').textContent='🎯 '+nombre;
  document.getElementById('modal-num').textContent=numComb;
  document.getElementById('modal-fecha').textContent=`${lot1} + ${lot2}`;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderCandidatos(sorteoKey, numComb);
  document.getElementById('modal').classList.add('show');
  actualizarAnalisis(sorteoKey, numComb);
}
